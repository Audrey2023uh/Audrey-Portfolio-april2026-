<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audrey Rah Portfolio</title>

  <!-- ✅ AUTO DETECT DEVICE -->
  <script>
    if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
      window.location.href = "https://audrey-portfolio-2026-2ppx.vercel.app/";
    } else {
      window.location.href = "https://audrey-portfolio-2026-nine.vercel.app";
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #03080f;
      color: white;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px;
    }

    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow-1 {
      width: 500px;
      height: 500px;
      background: rgba(0,212,255,0.06);
      top: -150px;
      right: -150px;
    }

    .bg-glow-2 {
      width: 400px;
      height: 400px;
      background: rgba(124,58,237,0.06);
      bottom: -100px;
      left: -100px;
    }

    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #080f1a, #0d1829);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 24px;
      padding: clamp(32px, 6vw, 60px) clamp(24px, 5vw, 56px);
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      margin: auto;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #00d4ff;
      margin-bottom: 18px;
    }

    .name {
      font-family: 'Space Mono', monospace;
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #7c3aed, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 14px;
    }

    .tagline {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid;
    }

    .t1 { color: #4de8ff; border-color: #00d4ff; }
    .t2 { color: #fca5a5; border-color: #ef4444; }
    .t3 { color: #34d399; border-color: #10b981; }
    .t4 { color: #c4b5fd; border-color: #7c3aed; }

    .divider {
      height: 1px;
      background: rgba(0,212,255,0.2);
      margin-bottom: 30px;
    }

    .footer {
      margin-top: 25px;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #1e3a4a;
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
        padding: 30px 10px;
      }

      .name { font-size: 2rem; }
      .tagline { font-size: 0.8rem; }
    }
  </style>
</head>

<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="card">
    <div class="eyebrow">// Portfolio</div>

    <div class="name">AUDREY RAH</div>

    <div class="tagline">
      Azure Cloud Data Architect · ETL Pipelines · AI Engineering · Cybersecurity
    </div>

    <div class="tags">
      <span class="tag t1">Azure Cloud</span>
      <span class="tag t2">Cybersecurity</span>
      <span class="tag t3">ETL Pipelines</span>
      <span class="tag t4">AI Engineering</span>
    </div>

    <div class="divider"></div>

    <div class="footer">
      University of Houston · UIT
    </div>
  </div>

</body>
</html>
